<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BubbleUp Laundry Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .login-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="text-center mb-4">
                <h2 class="text-primary fw-bold"><i class="fas fa-soap me-2"></i>BubbleUp</h2>
                <p class="text-muted fw-bold">Laundry Tracker</p> 
            </div>
            
            <div class="card login-card p-4">
                <div class="card-body">
                    <h4 class="card-title fw-bold mb-3 text-center">Sign In</h4>
                    
                    <div id="errorAlert" class="alert alert-danger d-none" role="alert">
                        <i class="fas fa-exclamation-circle me-2"></i> Invalid username or password! <br>(Hint: User / pass321)<br>
                    </div>

                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-user text-muted"></i></span>
                                <input type="text" class="form-control" id="username" placeholder="Enter username" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-lock text-muted"></i></span>
                                <input type="password" class="form-control" id="password" placeholder="Enter password" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
                            <i class="fas fa-sign-in-alt me-2"></i> Login
                        </button>
                    </form>
                </div>
            </div>
            
            <div class="text-center mt-4 text-muted small">
                <p>&copy; 2026 IMS566 Project. Developed by Fatirah.</p>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const user = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value;
        const errorAlert = document.getElementById('errorAlert');

        // Hardcoded simulation credentials
        if (user === 'User' && pass === 'pass321') {
            errorAlert.classList.add('d-none');
            // Store a simple local session flag
            localStorage.setItem('isLoggedIn', 'true');
            // Redirect to dashboard
            window.location.href = 'dashboard.html';
        } else {
            // Show structured error feedback
            errorAlert.classList.remove('d-none');
        }
    });
</script>

</body>
</html>
